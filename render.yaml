services:
  - type: web
    name: creditmind2-0
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python download_artifacts.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: CREDITMIND_DRIVE_FILE_ID
        value: 1XHzz3tCLkC05c8U4HN5FXOY1jzsqIRdT
